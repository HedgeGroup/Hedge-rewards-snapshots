name: Hedge Rewards Snapshots
on:
  schedule:
    - cron: '0 16 * * 6'
  workflow_dispatch:
jobs:
  execute-snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install Dependencies
        run: npm install axios
      - name: Run Snapshot
        env:
          TOKEN_MINT_ADDRESS: ${{ secrets.TOKEN_MINT_ADDRESS }}
        run: node snapshot.js
      - name: Commit Proof
        run: |
          git config --global user.name "Hedge-Autonomous-Engine"
          git config --global user.email "engine@hedge.protocol"
          git add snapshot_*.csv
          git commit -m "PROOF: Hedge Rewards Snapshot Complete" || exit 0
          git push
